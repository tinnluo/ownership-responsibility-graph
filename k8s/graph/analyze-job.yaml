apiVersion: batch/v1
kind: Job
metadata:
  name: ownership-graph-analyze
  namespace: ownership-graph
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-build-artifacts
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until [ -f /app/data/output/staged/entities.csv ] && [ -f /app/data/output/staged/asset_emissions.csv ]; do
                echo "waiting for graph build artifacts"
                sleep 5
              done
          volumeMounts:
            - name: graph-output
              mountPath: /app/data/output
      containers:
        - name: graph-analyzer
          image: ownership-responsibility-graph:latest
          imagePullPolicy: IfNotPresent
          command: ["ownership-graph-analyze"]
          args:
            - "--data-dir"
            - "/app/data/sample"
            - "--output-dir"
            - "/app/data/output"
            - "--root-entity-id"
            - "ENT_001"
            - "--asset-id"
            - "AST_100"
          volumeMounts:
            - name: graph-output
              mountPath: /app/data/output
      volumes:
        - name: graph-output
          persistentVolumeClaim:
            claimName: graph-output
