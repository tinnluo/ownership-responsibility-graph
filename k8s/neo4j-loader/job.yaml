apiVersion: batch/v1
kind: Job
metadata:
  name: ownership-graph-load-neo4j
  namespace: ownership-graph
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-neo4j
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z neo4j-service 7687; do
                echo "waiting for neo4j"
                sleep 5
              done
        - name: wait-for-analysis-artifacts
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until [ -f /app/data/output/analysis/responsibility_attribution.csv ] && [ -f /app/data/output/analysis/attributed_emission_relationships.csv ]; do
                echo "waiting for analysis artifacts"
                sleep 5
              done
          volumeMounts:
            - name: graph-output
              mountPath: /app/data/output
      containers:
        - name: neo4j-loader
          image: ownership-responsibility-graph:latest
          imagePullPolicy: IfNotPresent
          command: ["ownership-graph-load-neo4j"]
          args:
            - "--input-dir"
            - "/app/data/output"
            - "--wipe"
          envFrom:
            - configMapRef:
                name: ownership-graph-config
          env:
            - name: NEO4J_USERNAME
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: NEO4J_USERNAME
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: NEO4J_PASSWORD
          volumeMounts:
            - name: graph-output
              mountPath: /app/data/output
      volumes:
        - name: graph-output
          persistentVolumeClaim:
            claimName: graph-output
